name: duoshield
description: DuoShield - Privacy-first two-person secure messaging app with Signal Protocol encryption
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # Local notifications
  flutter_local_notifications: ^17.0.0

  # Signal Protocol
  libsignal_protocol_dart: ^0.4.0

  # Real AES-256-GCM encryption (replaces XOR placeholder)
  pointycastle: ^3.7.4

  # Seed phrase & cryptography
  bip39: ^1.0.6
  ed25519_hd_key: ^2.3.0

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  # Utilities
  uuid: ^4.4.0
  crypto: ^3.0.3
  convert: ^3.1.1
  bcrypt: ^1.1.3

  # Routing and navigation
  go_router: ^14.1.0

  # Functional programming
  dartz: ^0.10.1

  # Equatable for value equality
  equatable: ^2.0.5

  # Cupertino icons
  cupertino_icons: ^1.0.8

  # Meta package for annotations
  meta: ^1.12.0

  # Collection utilities
  collection: ^1.18.0

dependency_overrides:
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

  # Linting
  flutter_lints: ^4.0.0

  # Testing
  mockito: ^5.4.4
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # NOTE: Download RobotoMono fonts from fonts.google.com and place in assets/fonts/
  # then uncomment the block below:
  # fonts:
  #   - family: DuoShieldMono
  #     fonts:
  #       - asset: assets/fonts/RobotoMono-Regular.ttf
  #       - asset: assets/fonts/RobotoMono-Bold.ttf
  #         weight: 700
